<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Built-in AI Chat</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, Helvetica, sans-serif;
            }

            body {
                height: 100vh;
                overflow: hidden;
                background: #f5f5f5;
            }

            .chat-container {
                width: 50%;
                margin: auto;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .chat-box {
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                padding-bottom: 120px;
            }

            .message {
                max-width: 80%;
                padding: 12px 16px;
                border-radius: 14px;
                margin-bottom: 12px;
                word-wrap: break-word;
                line-height: 1.5;
            }

            .user {
                margin-left: auto;
                background: #d9ebff;
            }

            .ai {
                background: white;
                border: 1px solid #ddd;
            }

            .fade-in {
                animation: fadeIn 0.4s ease forwards;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    filter: blur(10px);
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    filter: blur(0);
                    transform: translateY(0);
                }
            }

            .input-bar {
                position: fixed;
                bottom: 15px;
                left: 50%;
                transform: translateX(-50%);
                width: min(900px, 95%);
                display: flex;
                gap: 10px;
                background: white;
                padding: 12px;
                border-radius: 14px;
                border: 1px solid #ddd;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            }

            .input-bar input {
                flex: 1;
                border: none;
                outline: none;
                font-size: 16px;
                padding: 12px;
            }

            .input-bar button {
                border: none;
                cursor: pointer;
                padding: 12px 18px;
                border-radius: 10px;
            }

            .status {
                position: fixed;
                top: 10px;
                left: 50%;
                transform: translateX(-50%);
                background: white;
                padding: 8px 12px;
                border-radius: 10px;
                font-size: 14px;
                border: 1px solid #ddd;
            }

            .typing {
                display: flex;
                gap: 5px;
                align-items: center;
            }

            .typing span {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: black;
                animation: bounce 1s infinite;
            }

            .typing span:nth-child(2) {
                animation-delay: 0.2s;
            }

            .typing span:nth-child(3) {
                animation-delay: 0.4s;
            }

            @keyframes bounce {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-5px);
                }
            }
        </style>
    </head>

    <body>
        <div class="chat-container">
            <div class="status" id="status">Initializing AI...</div>

            <div class="chat-box" id="chatBox"></div>

            <div class="input-bar">
                <input
                    id="inputField"
                    type="text"
                    placeholder="Ask anything..."
                />
                <button id="sendBtn">Send</button>
            </div>
        </div>

        <script>
            const STORAGE_KEY = "builtin-ai-chat";

            const chatBox = document.getElementById("chatBox");
            const inputField = document.getElementById("inputField");
            const sendBtn = document.getElementById("sendBtn");
            const statusText = document.getElementById("status");

            let session = null;
            let messages = [];

            function scrollToBottom() {
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            function saveMessages() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            }

            function addMessage(text, role) {
                const div = document.createElement("div");

                div.className = `message ${role} fade-in`;

                div.textContent = text;

                chatBox.appendChild(div);

                messages.push({
                    role,
                    content: text,
                });

                saveMessages();
                scrollToBottom();
            }

            function loadMessages() {
                const stored = localStorage.getItem(STORAGE_KEY);

                if (!stored) return;

                messages = JSON.parse(stored);

                messages.forEach((msg) => {
                    const div = document.createElement("div");

                    div.className = `message ${msg.role}`;

                    div.textContent = msg.content;

                    chatBox.appendChild(div);
                });

                scrollToBottom();
            }

            function showTyping() {
                const div = document.createElement("div");

                div.className = "message ai";

                div.id = "typing";

                div.innerHTML = `
        <div class="typing">
            <span></span>
            <span></span>
            <span></span>
        </div>
    `;

                chatBox.appendChild(div);

                scrollToBottom();
            }

            function removeTyping() {
                document.getElementById("typing")?.remove();
            }

            async function initializeAI() {
                try {
                    if (!window.LanguageModel) {
                        statusText.textContent = "Built-in AI unsupported";

                        sendBtn.disabled = true;

                        return;
                    }

                    session = await LanguageModel.create({
                        initialPrompts: [
                            {
                                role: "system",
                                content: `
You are a helpful assistant.

Rules:
- Use short paragraphs.
- Do not use markdown.
- Do not use emojis.
- Keep responses concise.
`,
                            },
                        ],
                    });

                    statusText.textContent = "AI Ready";
                } catch (error) {
                    console.error(error);

                    statusText.textContent = "Failed to initialize AI";
                }
            }

            async function sendMessage() {
                if (!session) return;

                const prompt = inputField.value.trim();

                if (!prompt) return;

                addMessage(prompt, "user");

                inputField.value = "";

                sendBtn.disabled = true;
                inputField.disabled = true;

                showTyping();

                statusText.textContent = "Generating...";

                try {
                    const response = await session.prompt(prompt);

                    removeTyping();

                    addMessage(response, "ai");

                    statusText.textContent = "AI Ready";
                } catch (error) {
                    console.error(error);

                    removeTyping();

                    addMessage("Something went wrong.", "ai");

                    statusText.textContent = "Generation failed";
                } finally {
                    sendBtn.disabled = false;
                    inputField.disabled = false;
                    inputField.focus();
                }
            }

            sendBtn.addEventListener("click", sendMessage);

            inputField.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    sendMessage();
                }
            });

            loadMessages();
            initializeAI();
        </script>
    </body>
</html>
